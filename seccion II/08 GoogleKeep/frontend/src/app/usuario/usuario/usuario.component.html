<div class="card flex justify-center">
    <p-dialog header="Usuario" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }">
        <div class="flex items-center gap-4 mb-4">
            <label for="username" class="font-semibold w-24">Username</label>
            <input pInputText id="username" class="flex-auto" autocomplete="off" [(ngModel)]="entity().name"/>
        </div>
        <div class="flex items-center gap-4 mb-8">
            <label for="email" class="font-semibold w-24">Email</label>
            <input pInputText id="email" class="flex-auto" autocomplete="off" [(ngModel)]="entity().email" />
        </div>
        <div class="flex items-center gap-4 mb-8">
            <label for="pwd" class="font-semibold w-24">Password</label>
            <input pInputText id="pwd" class="flex-auto" autocomplete="off" [(ngModel)]="entity().password"/>
        </div>
        <div class="flex justify-end gap-2">
            <p-button label="Cancel" severity="secondary" (click)="closeDialog()" />
            <p-button label="Save" (click)="saveMethod()" />
        </div>
    </p-dialog>
</div>
